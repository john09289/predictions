name: ECM Auto Data Pull

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install opentimestamps-client scipy numpy

      - name: Run monitor
        run: python monitor.py

      - name: Timestamp with OpenTimestamps
        run: |
          ots stamp docs/data/status_history.json || true

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/status_history.json docs/data/latest_hash.txt docs/data/*.ots 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update ECM status $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
