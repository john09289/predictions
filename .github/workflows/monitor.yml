name: ECM Auto Data Pull

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy requests opentimestamps-client

      - name: Run monitor with forensic logging
        run: |
          python monitor.py 2>&1 | tee monitor_log.txt

      - name: Timestamp with OpenTimestamps
        run: |
          if command -v ots &> /dev/null; then
            ots stamp status_history.json || echo "ots stamp failed, continuing"
            git add status_history.json.ots || true
          fi

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/status_history.json docs/data/latest_hash.txt docs/data/*.ots status_history.json latest_hash.txt error_log.txt monitor_log.txt *.ots 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update ECM status $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
