name: ECM Live Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run monitor
        run: python monitor.py
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/data/status_history.json docs/data/latest_hash.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update ECM status $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
