name: ECM Daily AI Review

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  daily-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build daily review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: |
          python scripts/build_daily_review.py
          python scripts/build_tracking.py

      - name: Commit and push if changed
        run: |
          git config user.name "ECM Daily Review"
          git config user.email "ecm-daily-review@noreply"
          git add docs/data/daily_review.json docs/tracking.html
          git diff --staged --quiet || git commit -m "auto: daily AI review $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
