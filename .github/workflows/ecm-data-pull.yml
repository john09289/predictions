name: ECM Auto Data Pull

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-tracking:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ECM data pipeline
        run: python scripts/pull_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "ECM Auto-Pipeline"
          git config user.email "ecm-pipeline@noreply"
          git add docs/tracking.html docs/data/live_data.json
          git diff --staged --quiet || git commit -m "auto: ECM data pull $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
